<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/petpass.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Invictus Brand Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet"
  />

  <title>Invictus Global Tech — CRM</title>
</head>

<body>
  <div id="root"></div>
  <!-- Catches pre-React JS errors (TDZ, missing chunks, etc.) that ErrorBoundary cannot reach -->
  <script>
    window.addEventListener('error', function(e) {
      var root = document.getElementById('root');
      if (root && !root.hasChildNodes()) {
        root.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:#f8f9fa;color:#333;text-align:center;padding:2rem"><h2 style="color:#cc3300">Application failed to start</h2><pre style="background:#fff;border:1px solid #ddd;border-radius:8px;padding:1rem;max-width:600px;overflow:auto;font-size:13px;text-align:left;white-space:pre-wrap;word-break:break-word">' + (e.message || 'Unknown error') + '\n\n' + (e.filename ? e.filename + ':' + e.lineno : '') + '</pre><button onclick="location.reload()" style="margin-top:1.5rem;padding:.6rem 1.5rem;background:#2E8B57;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px">Reload</button></div>';
      }
    });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
